version: "3.8"

services:
  backend:
    build: ./backend
    container_name: ai-copilot-backend
    ports:
      - "8000:8000"
    environment:
      - AI_API_KEY=${AI_API_KEY:-}
      - AI_API_BASE=${AI_API_BASE:-https://api.openai.com/v1}
      - AI_MODEL=${AI_MODEL:-gpt-4o}
    volumes:
      - ./storage:/app/storage
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: ai-copilot-frontend
    ports:
      - "5200:5200"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_BASE=http://localhost:8000
    restart: unless-stopped

  # Add reverse proxy later if needed:
